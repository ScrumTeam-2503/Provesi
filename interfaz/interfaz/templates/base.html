<!DOCTYPE html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
      integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
      crossorigin="anonymous"
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% block head %}
    <title>WMS Provesi</title>
    {% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand" href="/">
          <img src="/static/media/logo-uniandes.png" width="45" height="45" alt="" />
        </a>
      </nav>

      <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand" href="/"> WMS Provesi </a>
      </nav>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="pedidos/">Pedidos</a>
          </li>
        </ul>
      </div>
    </nav>

    <main style="height: 100vh;">
      <div class="container h-100 p-4">
        {% block content %}{% endblock %}
      </div>
    </main>
  </body>

  <!-- Footer -->
  <footer
    style="
      background-color: #d8d8d8;
      position: relative;
      bottom: 0;
      width: 100%;
      height: 100px;
    "
  >
    <div style="padding: 30px">
      <div style="float: left; width: 400px">
        ISIS-2503 Arquitectura y Diseño de Software
      </div>
      <div style="float: right; width: 220px">Universidad de los Andes</div>
      <br />
      <div style="float: left; width: 400px">
        <i>SCRUM Team</i>
      </div>
    </div>
  </footer>
  <!-- Footer -->
</html>
